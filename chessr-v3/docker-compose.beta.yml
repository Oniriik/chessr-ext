# Beta production stack — designed for the new Hetzner host (16 GB / 8 vCPU,
# CPX41 or equivalent x86 with AVX2). Drop-in replacement for the OVH
# version: adds Redis (BullMQ requirement), keeps serveur + dashboard +
# nginx + certbot as before.
#
# Required env vars (read from .env in this directory at compose time):
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY  — inlined into
#     the dashboard bundle at build (Next.js)
#   SUPABASE_SERVICE_KEY, SERVEUR_ADMIN_TOKEN, NEXT_PUBLIC_SERVEUR_URL
#     — runtime env for the dashboard
#
# Required: ./serveur/.env with SUPABASE_URL, SUPABASE_SERVICE_KEY,
# DISCORD_*, OPENAI_API_KEY, etc. See chessr-v3/serveur for the full list.
# REDIS_HOST/PORT are injected by this file → don't set them in .env.
#
# Boot:
#   docker compose -f docker-compose.beta.yml up -d --build
# Stop:
#   docker compose -f docker-compose.beta.yml down
# Logs:
#   docker compose -f docker-compose.beta.yml logs -f serveur

name: chessr

services:
  # ─── Redis — BullMQ broker for the suggestion + analysis queues ────────
  redis:
    image: redis:7-alpine
    container_name: chessr-redis
    restart: unless-stopped
    # AOF persistence so jobs survive a server restart. Default RDB
    # snapshots also kept as a safety net.
    command: >
      redis-server
      --appendonly yes
      --save 60 1
      --loglevel warning
      --maxmemory 2gb
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    networks:
      - chessr
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2560M
        reservations:
          memory: 256M

  # ─── Serveur (Hono + WS + BullMQ producer/worker) ──────────────────────
  serveur:
    build:
      context: ./serveur
      dockerfile: Dockerfile
    container_name: chessr-serveur
    restart: unless-stopped
    env_file:
      - ./serveur/.env
    environment:
      - NODE_ENV=production
      - PORT=8081
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Pool sizing — adjust per host capacity. CPX41 (8 vCPU) handles
      # 4 Komodo + 2 Stockfish without saturating.
      - MAX_KOMODO_INSTANCES=${MAX_KOMODO_INSTANCES:-4}
      - MAX_STOCKFISH_INSTANCES=${MAX_STOCKFISH_INSTANCES:-2}
      - LOG_DIR=/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chessr
    volumes:
      # Persist serveur logs hors du container (rotating 10MB×5).
      # Survit à compose down (sans -v).
      - ./serveur/logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: '6'
          memory: 6G
        reservations:
          cpus: '2'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Dashboard admin (Next.js) ─────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SERVEUR_URL: ${NEXT_PUBLIC_SERVEUR_URL}
        NEXT_PUBLIC_BULLBOARD_URL: ${NEXT_PUBLIC_BULLBOARD_URL:-/bullboard/}
    container_name: chessr-dashboard
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SERVEUR_ADMIN_TOKEN=${SERVEUR_ADMIN_TOKEN}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_SERVEUR_URL=${NEXT_PUBLIC_SERVEUR_URL}
    networks:
      - chessr
    deploy:
      resources:
        limits:
          memory: 1G

  # ─── Bull Board (custom build) — exposé sous /queues/board sur le ────
  # dashboard. Auth via Supabase session (middleware Next.js qui redirige
  # vers /login si pas connecté). Le custom build vs l'image off-the-shelf
  # nous permet d'appeler setBasePath('/queues/board') pour que toutes les
  # URLs de l'UI soient prefixées correctement — pas de proxy hacks.
  bullboard:
    build:
      context: ./bullboard
      dockerfile: Dockerfile
    container_name: chessr-bullboard
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BASE_PATH=/queues/board
      - QUEUE_NAMES=komodo,analysis,maia-2
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chessr
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── Nginx — TLS terminator + reverse proxy ────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: chessr-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./downloads:/var/www/downloads:ro
    depends_on:
      - serveur
      - dashboard
    networks:
      - chessr

  # ─── Certbot — Let's Encrypt cert renewal loop ─────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: chessr-certbot
    restart: unless-stopped
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet --deploy-hook "nginx -s reload 2>/dev/null || true"; sleep 12h & wait $${!}; done;'
    networks:
      - chessr

volumes:
  redis_data:

networks:
  chessr:
    driver: bridge
