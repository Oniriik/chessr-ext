# HTTP → HTTPS redirect + ACME challenge passthrough
server {
    listen 80;
    listen [::]:80;
    server_name beta.chessr.io;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS + reverse proxy to the serveur container
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name beta.chessr.io;

    ssl_certificate     /etc/letsencrypt/live/beta.chessr.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beta.chessr.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Reasonable buffer / timeout for long-running WS
    client_max_body_size  2m;
    proxy_read_timeout    3600s;
    proxy_send_timeout    3600s;
    proxy_connect_timeout 30s;

    # Re-resolve upstream hostnames every 10s via Docker's embedded DNS.
    # Without this, nginx caches the serveur container IP at boot and 502s
    # whenever the container is recreated (compose up -d serveur).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $serveur_upstream "serveur:8081";

    # Extension zip downloads (served statically, bypasses the node serveur)
    location /download/ {
        alias /var/www/downloads/;
        autoindex off;
        add_header Cache-Control "public, max-age=300";
        add_header Content-Disposition "attachment";
    }

    # Stable alias — /download/latest always serves the most recent beta zip.
    location = /download/latest {
        alias /var/www/downloads/chessr-beta-latest.zip;
        add_header Cache-Control "public, max-age=60";
        add_header Content-Disposition 'attachment; filename="chessr-beta-latest.zip"';
    }

    # WebSocket upgrade
    location /ws {
        proxy_pass http://$serveur_upstream/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Plain HTTP endpoints (health, discord callback, explanation, etc.)
    location / {
        proxy_pass http://$serveur_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
