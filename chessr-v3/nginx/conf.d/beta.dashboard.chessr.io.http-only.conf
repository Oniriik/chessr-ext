# Minimal HTTP-only config used ONCE to acquire the initial Let's Encrypt cert.
# After certbot succeeds, rename this to *.disabled and let the TLS config
# take over: `docker compose exec nginx nginx -s reload`.

server {
    listen 80;
    listen [::]:80;
    server_name beta.dashboard.chessr.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
