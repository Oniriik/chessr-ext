# Minimal HTTP-only config — used during initial cert acquisition AND
# during the v2→v3 migration window. Serves the maintenance page on
# port 80 so browsers landing here before TLS is issued still see
# something useful. After certbot succeeds, rename to *.disabled and
# let download.chessr.io.conf take over.

server {
    listen 80;
    listen [::]:80;
    server_name download.chessr.io;

    # Let's Encrypt webroot challenge — MUST come before the root location
    # so /.well-known/acme-challenge/... isn't shadowed by the static root.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Serve the downloads dir directly (maintenance.html / index.html /
    # assets / version.json). No Content-Disposition here so HTML renders
    # rather than being saved as a file.
    root /var/www/downloads;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Extension zips still download-as-attachment.
    location ~* \.zip$ {
        add_header Content-Disposition "attachment";
    }
}
