# HTTP-only bootstrap for app.chessr.io — handles the ACME challenge
# so certbot can issue the cert. After issuance, rename to *.disabled
# and let app.chessr.io.conf take over.

server {
    listen 80;
    listen [::]:80;
    server_name app.chessr.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 "app.chessr.io — TLS coming up\n";
        add_header Content-Type text/plain;
    }
}
