# HTTP-only bootstrap for dashboard.chessr.io — handles the ACME
# challenge so certbot can issue the cert. Returns a placeholder for
# anything else (no proxy yet — proxy only goes live with the HTTPS
# config). Once the cert exists, rename to *.disabled and let
# dashboard.chessr.io.conf take over.

server {
    listen 80;
    listen [::]:80;
    server_name dashboard.chessr.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 "dashboard.chessr.io — TLS coming up\n";
        add_header Content-Type text/plain;
    }
}
