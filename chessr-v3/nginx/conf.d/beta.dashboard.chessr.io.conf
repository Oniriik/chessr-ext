# HTTP → HTTPS redirect + ACME challenge passthrough
server {
    listen 80;
    listen [::]:80;
    server_name beta.dashboard.chessr.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS + reverse proxy to the dashboard container (Next.js standalone on :3000)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name beta.dashboard.chessr.io;

    # SAN cert covers both beta.chessr.io + beta.dashboard.chessr.io —
    # certbot issues it under the first name on the cert.
    ssl_certificate     /etc/letsencrypt/live/beta.chessr.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beta.chessr.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 2m;
    proxy_read_timeout   3600s;  # long hold for SSE log streams
    proxy_send_timeout   3600s;
    proxy_connect_timeout 30s;

    # Disable buffering so SSE streams reach the client in real time
    proxy_buffering off;

    # Bull Board — BullMQ inspector. Le SPA utilise des chemins absolus
    # (/api/*, /static/*) → impossible à servir proprement sous un préfixe
    # /bullboard sans réécrire le bundle. Simple : on l'ouvre sur la
    # racine du domaine, gated par basic auth (USER_LOGIN/USER_PASSWORD).
    # Le dashboard Next.js continue de servir tout le reste — Bull Board
    # ne se sert que sur les chemins explicites + /static + /api.
    location = /bullboard {
        return 302 /bullboard/;
    }
    location /bullboard/ {
        proxy_pass http://bullboard:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect / /bullboard/;
    }
    # Le SPA Bull Board appelle /api/* et /static/* en absolu — on les
    # route vers le container bullboard. Aucun conflit avec Next.js qui
    # utilise /api sous son propre router (les routes du dashboard sont
    # /api/auth, /api/logs, /api/metrics, /api/users — voir block ci-dessous).
    location /api/queues {
        proxy_pass http://bullboard:3000/api/queues;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /static/ {
        proxy_pass http://bullboard:3000/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://dashboard:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
