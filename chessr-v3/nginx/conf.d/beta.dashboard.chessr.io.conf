# HTTP → HTTPS redirect + ACME challenge passthrough
server {
    listen 80;
    listen [::]:80;
    server_name beta.dashboard.chessr.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS + reverse proxy to the dashboard container (Next.js standalone on :3000)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name beta.dashboard.chessr.io;

    ssl_certificate     /etc/letsencrypt/live/beta.dashboard.chessr.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beta.dashboard.chessr.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 2m;
    proxy_read_timeout   3600s;  # long hold for SSE log streams
    proxy_send_timeout   3600s;
    proxy_connect_timeout 30s;

    # Disable buffering so SSE streams reach the client in real time
    proxy_buffering off;

    location / {
        proxy_pass http://dashboard:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
