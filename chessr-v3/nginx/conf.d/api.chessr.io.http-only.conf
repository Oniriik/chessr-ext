# HTTP-only bootstrap for api.chessr.io — answers the ACME challenge so
# certbot can issue the cert. After issuance, rename to *.disabled and
# let api.chessr.io.conf take over.

server {
    listen 80;
    listen [::]:80;
    server_name api.chessr.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 "api.chessr.io — TLS coming up\n";
        add_header Content-Type text/plain;
    }
}
