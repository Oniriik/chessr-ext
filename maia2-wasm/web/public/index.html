<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maia 2 — WASM demo</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0e0f12;
      --fg: #e6e7ea;
      --muted: #8a8e96;
      --accent: #7aa2ff;
      --line: #20232a;
      --good: #4ade80;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--fg);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 13px; line-height: 1.5;
    }
    main { max-width: 880px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
    .sub { color: var(--muted); margin-bottom: 24px; }
    section {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 16px;
    }
    label { display: block; color: var(--muted); margin-bottom: 4px; font-size: 12px; }
    input[type=text], textarea {
      width: 100%;
      background: #16181d; color: var(--fg);
      border: 1px solid var(--line); border-radius: 4px;
      padding: 8px 10px;
      font-family: inherit; font-size: 13px;
    }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    .row > * { flex: 1 1 200px; min-width: 0; }
    button {
      background: var(--accent); color: #0e0f12;
      border: 0; padding: 8px 14px; border-radius: 4px;
      font: 600 13px ui-monospace, monospace; cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .stats { color: var(--muted); font-size: 12px; }
    .moves {
      list-style: none; padding: 0; margin: 0;
      display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px;
    }
    .moves li {
      display: flex; justify-content: space-between;
      padding: 4px 8px; border-radius: 3px;
      background: #16181d;
    }
    .moves li.top { background: #1a2433; }
    .moves .uci { color: var(--fg); }
    .moves .prob { color: var(--good); }
    .winbar {
      height: 12px; border-radius: 3px; background: #16181d; overflow: hidden;
      margin-top: 4px;
    }
    .winbar > div {
      height: 100%; background: linear-gradient(90deg, #fff, #ddd);
      transition: width 0.3s;
    }
    code { background: #16181d; padding: 1px 5px; border-radius: 3px; }
    .threadrow { display: flex; align-items: center; gap: 12px; }
    .threadrow input[type=range] { flex: 1; }
    .threadrow output {
      background: #16181d; padding: 2px 8px; border-radius: 3px;
      min-width: 32px; text-align: center;
    }
    .pill {
      display: inline-block; font-size: 11px; padding: 2px 6px;
      background: #16181d; border-radius: 3px; color: var(--muted);
      margin-right: 6px;
    }
    .pill.live { background: #1a3329; color: var(--good); }
  </style>
</head>
<body>
<main>
  <h1>Maia 2 — WASM demo</h1>
  <div class="sub">Human-like chess engine running entirely in your browser via onnxruntime-web.</div>

  <section id="status-section">
    <div id="status">Loading model …</div>
    <div class="stats" id="env"></div>
  </section>

  <section>
    <label for="fen">FEN</label>
    <input id="fen" type="text" value="r1bqkbnr/pppp1ppp/2n5/4p3/4P3/5N2/PPPP1PPP/RNBQKB1R w KQkq - 2 3" />

    <div class="row" style="margin-top: 12px;">
      <div>
        <label for="elo-self">Your Elo (side to move)</label>
        <input id="elo-self" type="number" value="1500" min="500" max="3000" step="50" />
      </div>
      <div>
        <label for="elo-oppo">Opponent Elo</label>
        <input id="elo-oppo" type="number" value="1500" min="500" max="3000" step="50" />
      </div>
    </div>

    <div style="margin-top: 12px;">
      <label for="threads">Threads</label>
      <div class="threadrow">
        <input id="threads" type="range" min="1" max="8" value="1" />
        <output id="threads-out">1</output>
      </div>
    </div>

    <div style="margin-top: 16px; display: flex; gap: 8px; align-items: center;">
      <button id="run">Predict</button>
      <button id="bench" style="background: #16181d; color: var(--fg); border: 1px solid var(--line);">Benchmark threads</button>
      <span class="stats" id="timing"></span>
    </div>
  </section>

  <section>
    <label>Win probability (side to move)</label>
    <div class="winbar"><div id="winbar" style="width: 50%"></div></div>
    <div class="stats" id="winprob-text" style="margin-top: 4px;">—</div>
  </section>

  <section>
    <label>Top legal moves</label>
    <ul class="moves" id="moves"></ul>
  </section>
</main>

<script type="module" src="./main.js"></script>
</body>
</html>
